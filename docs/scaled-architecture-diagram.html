<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatWeave Scaled Architecture</title>
<style>
  body { margin: 0; background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

</style>
</head>
<body>
<div class="diagram">

      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#f97316"/>

    <linearGradient id="pluginGrad" x1="0%" y1="0%" x2="0%" y2="100%">

      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>

    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1100" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">ChatWeave: Scaled Production Architecture</text>
  <text x="700" y="60" text-anchor="middle" font-size="13" fill="#64748b">High-Level System Design for 100K+ Users | Horizontal Scaling | Multi-Region Ready</text>

  <!-- ============================================ -->
  <!-- ROW 1: CLIENTS + CDN + WAF -->
  <!-- ============================================ -->

  <!-- Student Clients -->
  <rect x="30" y="90" width="280" height="140" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="90" width="280" height="32" rx="12" fill="url(#lbGrad)"/>
  <rect x="30" y="112" width="280" height="10" fill="url(#lbGrad)"/>
  <text x="170" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Student Clients</text>

  <text x="170" y="145" text-anchor="middle" font-size="10" fill="#4338ca" font-weight="bold">Web Browsers (Desktop + Mobile)</text>
  <text x="170" y="164" text-anchor="middle" font-size="9" fill="#6b7280">Chat UI + Plugin Iframes (sandboxed)</text>
  <text x="170" y="180" text-anchor="middle" font-size="9" fill="#6b7280">Socket.io WebSocket connections</text>
  <text x="170" y="196" text-anchor="middle" font-size="9" fill="#6b7280">JWT tokens stored in-memory</text>
  <text x="170" y="214" text-anchor="middle" font-size="8" fill="#94a3b8">100K+ concurrent students</text>

  <!-- CDN / Edge -->
  <rect x="370" y="90" width="300" height="140" rx="12" fill="white" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="370" y="90" width="300" height="32" rx="12" fill="url(#cdnGrad)"/>
  <rect x="370" y="112" width="300" height="10" fill="url(#cdnGrad)"/>
  <text x="520" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">CDN / Edge Network</text>

  <text x="520" y="142" text-anchor="middle" font-size="10" fill="#5b21b6" font-weight="bold">Cloudflare / CloudFront</text>
  <text x="520" y="160" text-anchor="middle" font-size="9" fill="#6b7280">Plugin static assets (React bundles ~10MB)</text>
  <text x="520" y="176" text-anchor="middle" font-size="9" fill="#6b7280">Chat UI HTML/CSS/JS cached at edge</text>
  <text x="520" y="192" text-anchor="middle" font-size="9" fill="#6b7280">Global PoPs — low-latency asset delivery</text>
  <text x="520" y="214" text-anchor="middle" font-size="8" fill="#7c3aed">Zero origin hits for static content</text>

  <!-- WAF + Security -->
  <rect x="730" y="90" width="280" height="140" rx="12" fill="white" stroke="#e11d48" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="730" y="90" width="280" height="32" rx="12" fill="url(#secGrad)"/>
  <rect x="730" y="112" width="280" height="10" fill="url(#secGrad)"/>
  <text x="870" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">WAF + DDoS Protection</text>

  <text x="870" y="142" text-anchor="middle" font-size="10" fill="#be123c" font-weight="bold">Cloudflare / AWS Shield</text>
  <text x="870" y="160" text-anchor="middle" font-size="9" fill="#6b7280">Rate limiting per student (50 msg/day)</text>
  <text x="870" y="176" text-anchor="middle" font-size="9" fill="#6b7280">Bot detection + CAPTCHA</text>
  <text x="870" y="192" text-anchor="middle" font-size="9" fill="#6b7280">TLS termination + certificate management</text>
  <text x="870" y="214" text-anchor="middle" font-size="8" fill="#e11d48">Layer 3/4/7 DDoS mitigation</text>

  <!-- Scale callout -->
  <rect x="1070" y="90" width="300" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="1070" y="90" width="300" height="32" rx="12" fill="#1e293b"/>
  <rect x="1070" y="112" width="300" height="10" fill="#1e293b"/>
  <text x="1220" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Scale Targets</text>

  <text x="1110" y="142" font-size="9" fill="#475569" font-weight="bold">Concurrent users:</text>
  <text x="1290" y="142" font-size="9" fill="#0ea5e9" font-weight="bold">10K–100K</text>
  <text x="1110" y="160" font-size="9" fill="#475569" font-weight="bold">Messages/day:</text>
  <text x="1290" y="160" font-size="9" fill="#0ea5e9" font-weight="bold">2M–20M</text>
  <text x="1110" y="178" font-size="9" fill="#475569" font-weight="bold">Plugin launches/day:</text>
  <text x="1290" y="178" font-size="9" fill="#0ea5e9" font-weight="bold">300K–3M</text>
  <text x="1110" y="196" font-size="9" fill="#475569" font-weight="bold">LLM tokens/month:</text>
  <text x="1290" y="196" font-size="9" fill="#0ea5e9" font-weight="bold">3B–30B</text>
  <text x="1110" y="214" font-size="9" fill="#475569" font-weight="bold">Target latency (p99):</text>
  <text x="1290" y="214" font-size="9" fill="#0ea5e9" font-weight="bold">&lt; 200ms (API)</text>

  <!-- Arrows: Clients -> CDN, Clients -> WAF -->
  <line x1="310" y1="160" x2="368" y2="160" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="339" y="153" text-anchor="middle" font-size="7" fill="#94a3b8">static</text>

  <!-- ============================================ -->
  <!-- ROW 2: LOAD BALANCER -->

  <rect x="250" y="292" width="520" height="10" fill="url(#lbGrad)"/>
  <text x="510" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Load Balancer (nginx / AWS ALB)</text>
  <text x="510" y="318" text-anchor="middle" font-size="9" fill="#6b7280">Sticky sessions for Socket.io | Health checks | SSL passthrough | Round-robin with least-connections</text>

  <!-- Arrow: WAF -> LB -->
  <line x1="870" y1="230" x2="650" y2="268" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="780" y="244" text-anchor="middle" font-size="7" fill="#94a3b8">HTTPS + WSS</text>

  <!-- Arrow: Client -> LB -->
  <line x1="170" y1="230" x2="370" y2="268" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="260" y="244" text-anchor="middle" font-size="7" fill="#94a3b8">API + WebSocket</text>

  <!-- ============================================ -->
  <!-- ROW 3: EXPRESS INSTANCES (Horizontal Scaling) -->
  <!-- ============================================ -->
  <rect x="30" y="370" width="990" height="190" rx="14" fill="white" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="370" width="990" height="36" rx="14" fill="#1e293b"/>
  <rect x="30" y="394" width="990" height="12" fill="#1e293b"/>

  <text x="525" y="380" text-anchor="middle" font-size="9" fill="#94a3b8">4-20 instances | 4 vCPU / 8 GB each | Container orchestration (ECS / K8s)</text>

  <rect x="55" y="438" width="220" height="8" fill="url(#serverGrad)"/>

  <text x="165" y="465" text-anchor="middle" font-size="9" fill="#0369a1" font-weight="bold">Socket Service</text>
  <text x="165" y="478" text-anchor="middle" font-size="8" fill="#6b7280">chat:message | plugin:invoke</text>
  <text x="165" y="494" text-anchor="middle" font-size="9" fill="#065f46" font-weight="bold">Plugin Registry</text>
  <text x="165" y="507" text-anchor="middle" font-size="8" fill="#6b7280">In-memory cache | Tool building</text>
  <text x="165" y="523" text-anchor="middle" font-size="9" fill="#475569" font-weight="bold">REST API Routes</text>
  <text x="165" y="535" text-anchor="middle" font-size="8" fill="#6b7280">Auth | Chat | Plugins | Moderation</text>

  <!-- Instance 2 -->
  <rect x="295" y="420" width="220" height="120" rx="10" fill="white" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="295" y="420" width="220" height="26" rx="10" fill="url(#serverGrad)"/>
  <rect x="295" y="438" width="220" height="8" fill="url(#serverGrad)"/>
  <text x="405" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Instance 2</text>

  <text x="405" y="465" text-anchor="middle" font-size="9" fill="#0369a1" font-weight="bold">Socket Service</text>
  <text x="405" y="478" text-anchor="middle" font-size="8" fill="#6b7280">chat:message | plugin:invoke</text>
  <text x="405" y="494" text-anchor="middle" font-size="9" fill="#065f46" font-weight="bold">Plugin Registry</text>
  <text x="405" y="507" text-anchor="middle" font-size="8" fill="#6b7280">In-memory cache | Tool building</text>
  <text x="405" y="523" text-anchor="middle" font-size="9" fill="#475569" font-weight="bold">REST API Routes</text>
  <text x="405" y="535" text-anchor="middle" font-size="8" fill="#6b7280">Auth | Chat | Plugins | Moderation</text>

  <!-- Instance 3 -->
  <rect x="535" y="420" width="220" height="120" rx="10" fill="white" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="535" y="420" width="220" height="26" rx="10" fill="url(#serverGrad)"/>
  <rect x="535" y="438" width="220" height="8" fill="url(#serverGrad)"/>
  <text x="645" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Instance 3</text>

  <text x="645" y="465" text-anchor="middle" font-size="9" fill="#0369a1" font-weight="bold">Socket Service</text>
  <text x="645" y="478" text-anchor="middle" font-size="8" fill="#6b7280">chat:message | plugin:invoke</text>
  <text x="645" y="494" text-anchor="middle" font-size="9" fill="#065f46" font-weight="bold">Plugin Registry</text>
  <text x="645" y="507" text-anchor="middle" font-size="8" fill="#6b7280">In-memory cache | Tool building</text>
  <text x="645" y="523" text-anchor="middle" font-size="9" fill="#475569" font-weight="bold">REST API Routes</text>
  <text x="645" y="535" text-anchor="middle" font-size="8" fill="#6b7280">Auth | Chat | Plugins | Moderation</text>

  <!-- Instance N (dashed) -->
  <rect x="775" y="420" width="220" height="120" rx="10" fill="white" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="775" y="420" width="220" height="26" rx="10" fill="url(#serverGrad)" opacity="0.6"/>
  <rect x="775" y="438" width="220" height="8" fill="url(#serverGrad)" opacity="0.6"/>
  <text x="885" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="white" opacity="0.8">Instance N...</text>

  <text x="885" y="475" text-anchor="middle" font-size="10" fill="#0369a1" font-weight="bold">Auto-scales based on</text>
  <text x="885" y="492" text-anchor="middle" font-size="10" fill="#0369a1" font-weight="bold">CPU + connection count</text>
  <text x="885" y="520" text-anchor="middle" font-size="9" fill="#94a3b8">Min: 4 instances</text>
  <text x="885" y="535" text-anchor="middle" font-size="9" fill="#94a3b8">Max: 20 instances</text>

  <!-- Arrow: LB -> Instances -->
  <line x1="400" y1="330" x2="165" y2="418" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="510" y1="330" x2="405" y2="418" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="570" y1="330" x2="645" y2="418" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="650" y1="330" x2="885" y2="418" stroke="#0ea5e9" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>

  <!-- ============================================ -->
  <!-- ROW 3 RIGHT: LLM WORKER POOL -->
  <!-- ============================================ -->
  <rect x="1070" y="370" width="300" height="190" rx="14" fill="white" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1070" y="370" width="300" height="36" rx="14" fill="url(#workerGrad)"/>
  <rect x="1070" y="394" width="300" height="12" fill="url(#workerGrad)"/>
  <text x="1220" y="393" text-anchor="middle" font-size="14" font-weight="bold" fill="white">LLM Worker Pool</text>
  <text x="1220" y="380" text-anchor="middle" font-size="9" fill="white" opacity="0.8">Separate process — offloads AI calls</text>

  <text x="1220" y="425" text-anchor="middle" font-size="10" fill="#831843" font-weight="bold">BullMQ Job Queue</text>
  <text x="1220" y="442" text-anchor="middle" font-size="9" fill="#6b7280">Express enqueues LLM requests</text>
  <text x="1220" y="455" text-anchor="middle" font-size="9" fill="#6b7280">Workers process via streamText()</text>

  <!-- Worker boxes -->
  <rect x="1090" y="470" width="85" height="40" rx="6" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
  <text x="1132" y="488" text-anchor="middle" font-size="9" fill="#831843" font-weight="bold">Worker 1</text>
  <text x="1132" y="502" text-anchor="middle" font-size="7" fill="#6b7280">Claude API</text>

  <rect x="1187" y="470" width="85" height="40" rx="6" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1"/>
  <text x="1229" y="488" text-anchor="middle" font-size="9" fill="#831843" font-weight="bold">Worker 2</text>
  <text x="1229" y="502" text-anchor="middle" font-size="7" fill="#6b7280">Claude API</text>

  <rect x="1284" y="470" width="65" height="40" rx="6" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="1316" y="493" text-anchor="middle" font-size="9" fill="#831843">N...</text>

  <text x="1220" y="535" text-anchor="middle" font-size="9" fill="#831843" font-weight="bold">Model Routing Strategy</text>
  <text x="1220" y="550" text-anchor="middle" font-size="8" fill="#6b7280">Haiku (70%): simple replies — $0.25/1M tokens</text>

  <!-- ============================================ -->
  <!-- ROW 4: REDIS + MESSAGE QUEUE + DATABASE -->
  <!-- ============================================ -->

  <!-- Redis Cluster -->
  <rect x="30" y="600" width="340" height="180" rx="12" fill="white" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="600" width="340" height="32" rx="12" fill="url(#redisGrad)"/>
  <rect x="30" y="622" width="340" height="10" fill="url(#redisGrad)"/>
  <text x="200" y="622" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Redis Cluster</text>

  <text x="200" y="650" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">Upstash / ElastiCache</text>

  <!-- Redis use 1: Socket.io adapter -->
  <rect x="50" y="665" width="140" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="120" y="683" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="bold">Socket.io Adapter</text>
  <text x="120" y="696" text-anchor="middle" font-size="8" fill="#6b7280">Pub/Sub across all</text>
  <text x="120" y="707" text-anchor="middle" font-size="8" fill="#6b7280">Express instances</text>

  <!-- Redis use 2: Session cache -->
  <rect x="210" y="665" width="140" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="280" y="683" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="bold">Session Cache</text>
  <text x="280" y="696" text-anchor="middle" font-size="8" fill="#6b7280">JWT validation cache</text>
  <text x="280" y="707" text-anchor="middle" font-size="8" fill="#6b7280">Plugin registry cache</text>

  <!-- Redis use 3: BullMQ -->
  <rect x="50" y="725" width="300" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="200" y="743" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="bold">BullMQ Job Queue Backend</text>
  <text x="200" y="757" text-anchor="middle" font-size="8" fill="#6b7280">LLM request queue | Rate limiting | Job retry with backoff</text>

  <!-- Arrow: Instances -> Redis -->
  <line x1="300" y1="560" x2="200" y2="598" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="235" y="576" text-anchor="middle" font-size="7" fill="#dc2626">pub/sub + cache</text>

  <!-- Message Queue -->
  <rect x="410" y="600" width="300" height="180" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="410" y="600" width="300" height="32" rx="12" fill="url(#queueGrad)"/>
  <rect x="410" y="622" width="300" height="10" fill="url(#queueGrad)"/>
