<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatWeave</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #f8f9fa; --bg-card: #fff; --bg-input: #fff; --bg-msg-user: #4263eb;
      --bg-msg-ai: #f1f3f5; --text: #212529; --text-dim: #868e96;
      --text-user: #fff; --text-ai: #212529; --border: #dee2e6;
      --primary: #4263eb; --primary-hover: #3b5bdb; --shadow: rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; width: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

    /* Auth screens */
    .auth-container { display: flex; align-items: center; justify-content: center; width: 100%; height: 100vh; }
    .auth-card { background: var(--bg-card); border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 4px 24px var(--shadow); }
    .auth-card h1 { font-size: 24px; margin-bottom: 4px; text-align: center; }
    .auth-card p { color: var(--text-dim); font-size: 14px; text-align: center; margin-bottom: 24px; }
    .auth-card label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; margin-top: 12px; }
    .auth-card input, .auth-card select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
    .auth-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(66,99,235,0.15); }
    .auth-card button { width: 100%; padding: 11px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .auth-card button:hover { background: var(--primary-hover); }
    .auth-card button:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-card .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-dim); }
    .auth-card .switch a { color: var(--primary); cursor: pointer; text-decoration: none; }
    .auth-error { background: #fff5f5; color: #c92a2a; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 8px; }

    /* Chat layout */
    .chat-app { display: flex; width: 100%; height: 100vh; }
    .sidebar { width: 260px; min-width: 260px; flex-shrink: 0; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-header h2 { font-size: 16px; }
    .sidebar-header button { background: var(--primary); color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item:hover { background: var(--bg); }
    .session-item.active { background: #e7f0ff; color: var(--primary); font-weight: 600; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-dim); }
    .sidebar-footer button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px; }
    .sidebar-footer button:hover { color: #c92a2a; }

    /* Main chat area */
    .chat-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; }
    .chat-header h3 { font-size: 15px; font-weight: 600; }
    .connection-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
    .connection-badge.connected { background: #d3f9d8; color: #2b8a3e; }
    .connection-badge.disconnected { background: #ffe3e3; color: #c92a2a; }

    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
    .message.user { align-self: flex-end; background: var(--bg-msg-user); color: var(--text-user); border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: var(--bg-msg-ai); color: var(--text-ai); border-bottom-left-radius: 4px; }
    .message.system { align-self: center; background: #fff9db; color: #e67700; font-size: 12px; padding: 6px 12px; border-radius: 8px; max-width: 90%; }
    .message.streaming { border: 1px solid var(--border); }
    .typing-indicator { align-self: flex-start; color: var(--text-dim); font-size: 13px; padding: 8px 0; }
    .typing-indicator span { animation: blink 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    /* Plugin iframe */
    .plugin-frame { align-self: flex-start; width: 95%; max-width: 680px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--bg-card); margin: 4px 0; }
    .plugin-frame-header { padding: 8px 12px; background: var(--bg); font-size: 12px; font-weight: 600; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; }
    .plugin-frame-header .badge { background: #d3f9d8; color: #2b8a3e; padding: 2px 8px; border-radius: 8px; font-size: 11px; }
    .plugin-frame iframe { width: 100%; border: none; display: block; }
    .plugin-loading { display: flex; align-items: center; gap: 12px; padding: 20px 24px; color: var(--text-dim); font-size: 14px; }
    .plugin-loading-dots { display: flex; gap: 4px; }
    .plugin-loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: pluginBounce 1.4s ease-in-out infinite; }
    .plugin-loading-dots span:nth-child(2) { animation-delay: 0.16s; }
    .plugin-loading-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes pluginBounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* Input area */
    .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-card); display: flex; gap: 10px; }
    .input-area textarea { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 120px; }
    .input-area textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(66,99,235,0.15); }
    .input-area button { padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .input-area button:hover { background: var(--primary-hover); }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); gap: 8px; text-align: center; width: 100%; overflow-y: auto; padding: 24px; }
    .empty-state h3 { font-size: 24px; color: var(--text); font-weight: 700; }
    .empty-state p { font-size: 14px; }

    /* App Discovery Grid */
    .app-discovery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; width: 100%; max-width: 740px; margin-top: 20px; }
    .app-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; text-align: left; transition: transform 0.15s, box-shadow 0.15s; }
    .app-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px var(--shadow); }
    .app-card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .app-card-info { min-width: 0; }
    .app-card-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .app-card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .app-card-try { font-size: 11px; color: var(--primary); margin-top: 6px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '';
    let state = {
      screen: 'login',
      token: null,
      user: null,
      sessions: [],
      activeSessionId: null,
      messages: [],
      streamingText: '',
      isStreaming: false,
      generationId: null,
      isConnected: false,
      socket: null,
      activePlugins: {},
    };

    // Track which session the chat shell was last rendered for
    let renderedSessionId = null;

    // Try restore from localStorage
    const saved = localStorage.getItem('chatbridge-auth');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed.token) {
          state.token = parsed.token;
          state.user = parsed.user;
          state.screen = 'chat';
        }
      } catch {}
    }

    // ========== API helpers ==========
    async function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...opts.headers };
      if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
      const res = await fetch(`${API}${path}`, { ...opts, headers, credentials: 'include' });
      if (res.status === 401) {
        logout();
        throw new Error('Session expired. Please log in again.');
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Request failed');
      return data;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        const msgs = document.getElementById('messages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
      });
    }

    // ========== Auth ==========
    async function login(email, password) {
      const data = await api('/api/auth/register', {
        method: 'POST',
        body: JSON.stringify({ email, password, displayName: email.split('@')[0], role: 'student' }),
      }).catch(() => null);
      const loginData = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });
      state.token = loginData.token;
      state.user = loginData.user;
      localStorage.setItem('chatbridge-auth', JSON.stringify({ token: state.token, user: state.user }));
      state.screen = 'chat';
      connectSocket();
      loadSessions();
      renderFull();
    }

    function logout() {
      state.token = null;
      state.user = null;
      state.sessions = [];
      state.activeSessionId = null;
      state.messages = [];
      state.screen = 'login';
      state.activePlugins = {};
      renderedSessionId = null;
      localStorage.removeItem('chatbridge-auth');
      if (state.socket) { state.socket.disconnect(); state.socket = null; }
      renderFull();
    }

    // ========== Sessions ==========
    async function loadSessions() {
      try {
        const data = await api('/api/chat/sessions');
        state.sessions = data.sessions || [];
        updateSidebar();
      } catch {}
    }

    async function createSession() {
      try {
        const data = await api('/api/chat/sessions', {
          method: 'POST',
          body: JSON.stringify({ title: 'New Chat' }),
        });
        state.sessions.unshift(data.session);
        await selectSession(data.session.id);
      } catch (err) {
        console.error('createSession error:', err);
        alert('Failed to create session: ' + err.message);
      }
    }

    async function selectSession(id) {
      state.activeSessionId = id;
      state.activePlugins = {};
      state.isStreaming = false;
      state.streamingText = '';
      renderedSessionId = null; // force full re-render of chat area
      try {
        const data = await api(`/api/chat/sessions/${id}`);
        state.messages = data.messages || [];
      } catch {
        state.messages = [];
      }
      renderFull();
      scrollToBottom();
    }

    // ========== Socket.io ==========
    function connectSocket() {
      if (state.socket) state.socket.disconnect();
      const socket = io(window.location.origin, { auth: { token: state.token }, transports: ['websocket', 'polling'] });

      socket.on('connect', () => {
        state.isConnected = true;
        updateConnectionBadge();
      });
      socket.on('disconnect', () => {
        state.isConnected = false;
        updateConnectionBadge();
      });

      // --- Streaming: all incremental DOM updates, never full render ---
      socket.on('chat:stream:start', (data) => {
        state.isStreaming = true;
        state.streamingText = '';
        state.generationId = data.generationId;
        // Add streaming bubble to messages area
        const msgs = document.getElementById('messages');
        if (msgs) {
          // Remove any old streaming div
          const old = document.getElementById('streaming-msg');
          if (old) old.remove();
          const div = document.createElement('div');
          div.id = 'streaming-msg';
          div.className = 'message assistant streaming';
          div.innerHTML = '<span class="typing-indicator"><span>.</span><span>.</span><span>.</span></span>';
          msgs.appendChild(div);
          updateInputArea();
          scrollToBottom();
        }
      });

      socket.on('chat:stream', (data) => {
        state.streamingText += data.token;
        const el = document.getElementById('streaming-msg');
        if (el) {
          el.textContent = state.streamingText;
        }
        scrollToBottom();
      });

      socket.on('chat:stream:end', (data) => {
        state.messages.push({ role: 'assistant', content: state.streamingText, id: data.messageId });
        state.isStreaming = false;
        state.streamingText = '';
        state.generationId = null;
        // Replace streaming div with final message
        const el = document.getElementById('streaming-msg');
        if (el) el.remove();
        appendMessageDiv({ role: 'assistant', content: state.messages[state.messages.length - 1].content });
        updateInputArea();
        scrollToBottom();
      });

      socket.on('chat:error', (data) => {
        state.isStreaming = false;
        state.streamingText = '';
        state.generationId = null;
        const el = document.getElementById('streaming-msg');
        if (el) el.remove();
        state.messages.push({ role: 'system', content: data.message });
        appendMessageDiv({ role: 'system', content: data.message });
        updateInputArea();
      });

      socket.on('plugin:invoke', (data) => {
        handlePluginInvoke(data);
      });

      state.socket = socket;
    }

    // ========== Incremental DOM helpers ==========

    function appendMessageDiv(msg) {
      const msgs = document.getElementById('messages');
      if (!msgs) return;
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      div.textContent = msg.content;
      msgs.appendChild(div);
    }

    function updateConnectionBadge() {
      const badge = document.querySelector('.connection-badge');
      if (badge) {
        badge.className = `connection-badge ${state.isConnected ? 'connected' : 'disconnected'}`;
        badge.textContent = state.isConnected ? 'Connected' : 'Disconnected';
      }
    }

    function updateSidebar() {
      const list = document.querySelector('.session-list');
      if (!list) return;
      list.innerHTML = state.sessions.map(s => `
        <div class="session-item ${s.id === state.activeSessionId ? 'active' : ''}"
             onclick="selectSession('${s.id}')">
          ${escapeHtml(s.title) || 'Untitled'}
        </div>
      `).join('');
    }

    function updateInputArea() {
      const area = document.querySelector('.input-area');
      if (!area) return;
      const wasValue = document.getElementById('chat-input')?.value || '';
      area.innerHTML = `
        <textarea id="chat-input" placeholder="Ask me anything or try "I want to practice math!""
                  rows="1" ${state.isStreaming ? 'disabled' : ''}></textarea>
        ${state.isStreaming
          ? '<button onclick="cancelGeneration()" style="background:#c92a2a">Stop</button>'
          : '<button onclick="handleSend()">Send</button>'}
      `;
      const input = document.getElementById('chat-input');
      if (input) {
        input.value = wasValue;
        if (!state.isStreaming) input.focus();
        input.onkeydown = (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        };
        input.oninput = () => {
          input.style.height = 'auto';
          input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        };
      }
    }

    // ========== Plugin handling ==========
    async function handlePluginInvoke(data) {
      const { toolCallId, pluginId, toolName, parameters, sessionId } = data;

      try {
        const pluginData = await api(`/api/plugins/${pluginId}`);
        const plugin = pluginData.plugin;
        const manifest = typeof plugin.manifest === 'string' ? JSON.parse(plugin.manifest) : plugin;
        const iframeUrl = manifest.iframe_url;
        const instanceId = `${pluginId}_${Date.now()}`;

        let existingInstance = Object.entries(state.activePlugins).find(([, p]) => p.pluginId === pluginId);
        let targetInstanceId;

        if (existingInstance) {
          targetInstanceId = existingInstance[0];
        } else {
          targetInstanceId = instanceId;
          state.activePlugins[targetInstanceId] = {
            pluginId,
            pluginName: plugin.name || pluginId,
            iframeUrl,
            height: manifest.ui?.default_height || 600,
            status: 'loading',
            pendingInvocations: [],
          };
          state.messages.push({ role: 'plugin', pluginId, instanceId: targetInstanceId });
          // Append plugin frame directly to DOM — NO full render
          appendPluginFrame(targetInstanceId, state.activePlugins[targetInstanceId]);
          scrollToBottom();
        }

        state.activePlugins[targetInstanceId].pendingInvocations.push({ toolCallId, toolName, parameters });

        if (state.activePlugins[targetInstanceId].status === 'ready') {
          sendToolInvoke(targetInstanceId, toolCallId, toolName, parameters);
        }
      } catch (err) {
        console.error('Plugin invoke error:', err);
        state.socket.emit('plugin:result', { toolCallId, result: { error: err.message } });
      }
    }

    function appendPluginFrame(instanceId, plugin) {
      const msgs = document.getElementById('messages');
      if (!msgs) return;

      const frame = document.createElement('div');
      frame.className = 'plugin-frame';
      frame.id = `plugin-frame-${instanceId}`;

      const header = document.createElement('div');
      header.className = 'plugin-frame-header';
      header.innerHTML = `${escapeHtml(plugin.pluginName)} <span style="font-weight:400;font-size:11px;">Loading...</span>`;
      frame.appendChild(header);

      const loading = document.createElement('div');
      loading.className = 'plugin-loading';
      loading.id = `plugin-loading-${instanceId}`;
      loading.innerHTML = `<div class="plugin-loading-dots"><span></span><span></span><span></span></div> Loading ${escapeHtml(plugin.pluginName)}...`;
      frame.appendChild(loading);

      const iframe = document.createElement('iframe');
      iframe.id = `plugin-iframe-${instanceId}`;
      iframe.src = plugin.iframeUrl;
      iframe.sandbox = 'allow-scripts allow-same-origin allow-popups';
      iframe.style.cssText = `width:100%;border:none;display:none;height:${plugin.height}px;`;
      frame.appendChild(iframe);

      msgs.appendChild(frame);
    }

    function sendToolInvoke(instanceId, toolCallId, toolName, parameters) {
      const plugin = state.activePlugins[instanceId];
      if (!plugin) return;
      const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
      if (!iframe) return;

      const msgId = `msg_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
      iframe.contentWindow.postMessage({
        type: 'TOOL_INVOKE',
        messageId: msgId,
        payload: { toolName, parameters },
      }, '*');

      if (!window._toolCallMap) window._toolCallMap = {};
      window._toolCallMap[msgId] = toolCallId;
    }

    // Listen for plugin messages
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || typeof data.type !== 'string') return;

      switch (data.type) {
        case 'PLUGIN_READY': {
          for (const [instanceId, plugin] of Object.entries(state.activePlugins)) {
            const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
            if (iframe && iframe.contentWindow === event.source) {
              plugin.status = 'ready';
              // Send init
              iframe.contentWindow.postMessage({
                type: 'PLUGIN_INIT',
                messageId: `msg_${Date.now()}`,
                payload: { sessionId: state.activeSessionId, theme: 'light', locale: 'en', config: {} },
              }, '*');
              // Show iframe, hide loading
              const loading = document.getElementById(`plugin-loading-${instanceId}`);
              if (loading) loading.remove();
              iframe.style.display = 'block';
              // Auto-resize: poll iframe content height, only grow never shrink
              const minHeight = plugin.height || 600;
              let resizeAttempts = 0;
              const resizeInterval = setInterval(() => {
                try {
                  const body = iframe.contentDocument?.body;
                  if (body) {
                    const contentHeight = Math.max(body.scrollHeight + 20, minHeight);
                    if (contentHeight > plugin.height) {
                      iframe.style.height = contentHeight + 'px';
                      plugin.height = contentHeight;
                    }
                  }
                } catch(e) { /* cross-origin, ignore */ }
                if (++resizeAttempts >= 15) clearInterval(resizeInterval);
              }, 800);
              // Update header
              const frame = document.getElementById(`plugin-frame-${instanceId}`);
              if (frame) {
                const header = frame.querySelector('.plugin-frame-header');
                if (header) header.innerHTML = escapeHtml(plugin.pluginName);
              }
              // Process pending invocations
              for (const inv of plugin.pendingInvocations || []) {
                setTimeout(() => sendToolInvoke(instanceId, inv.toolCallId, inv.toolName, inv.parameters), 100);
              }
              plugin.pendingInvocations = [];
              // NO render() call — just direct DOM manipulation above
            }
          }
          break;
        }
        case 'TOOL_RESULT': {
          const toolCallId = window._toolCallMap?.[data.messageId];
          if (toolCallId && state.socket) {
            state.socket.emit('plugin:result', { toolCallId, result: data.payload?.result });
            delete window._toolCallMap[data.messageId];
          }
          break;
        }
        case 'PLUGIN_COMPLETE': {
          for (const [instanceId, plugin] of Object.entries(state.activePlugins)) {
            const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
            if (iframe && iframe.contentWindow === event.source) {
              plugin.status = 'completed';
              plugin.completionSummary = data.payload?.summary || 'Completed';
              // Update header with badge
              const frame = document.getElementById(`plugin-frame-${instanceId}`);
              if (frame) {
                const header = frame.querySelector('.plugin-frame-header');
                if (header) header.innerHTML = `${escapeHtml(plugin.pluginName)} <span class="badge">Completed</span>`;
              }
              if (state.socket) {
                state.socket.emit('plugin:complete', {
                  sessionId: state.activeSessionId,
                  pluginId: plugin.pluginId,
                  instanceId,
                  event: data.payload?.event,
                  completionData: data.payload?.data || {},
                  summary: data.payload?.summary || '',
                });
              }
              // NO render() call
            }
          }
          break;
        }
        case 'PLUGIN_RESIZE': {
          for (const [instanceId, plugin] of Object.entries(state.activePlugins)) {
            const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
            if (iframe && iframe.contentWindow === event.source) {
              plugin.height = data.payload?.height || 400;
              iframe.style.height = plugin.height + 'px';
              // NO render() call
            }
          }
          break;
        }
      }
    });

    // ========== Send message ==========
    function sendMessage(text) {
      if (!text.trim() || !state.activeSessionId || state.isStreaming) return;
      state.messages.push({ role: 'user', content: text });
      state.socket.emit('chat:message', { sessionId: state.activeSessionId, content: text });
      // Append directly — no full render
      appendMessageDiv({ role: 'user', content: text });
      scrollToBottom();
    }

    function cancelGeneration() {
      if (state.generationId && state.socket) {
        state.socket.emit('chat:cancel', { generationId: state.generationId });
        state.isStreaming = false;
        if (state.streamingText) {
          state.messages.push({ role: 'assistant', content: state.streamingText + ' [cancelled]' });
        }
        state.streamingText = '';
        state.generationId = null;
        const el = document.getElementById('streaming-msg');
        if (el) el.remove();
        if (state.messages.length > 0) {
          const last = state.messages[state.messages.length - 1];
          if (last.content.endsWith('[cancelled]')) appendMessageDiv(last);
        }
        updateInputArea();
      }
    }

    function handleSend() {
      const input = document.getElementById('chat-input');
      if (input && input.value.trim()) {
        sendMessage(input.value);
        input.value = '';
        input.style.height = 'auto';
      }
    }

    // ========== Full Render (only for screen/session changes) ==========
    function renderFull() {
      const app = document.getElementById('app');

      if (state.screen === 'login' || state.screen === 'register') {
        renderedSessionId = null;
        const isRegister = state.screen === 'register';
        app.innerHTML = `
          <div class="auth-container">
            <div class="auth-card">
              <h1>ChatWeave</h1>
              <p>${isRegister ? 'Create your account' : 'Sign in to start chatting'}</p>
              <div id="auth-error"></div>
              <form id="auth-form">
                ${isRegister ? '<label>Display Name</label><input id="auth-name" placeholder="Your name" required />' : ''}
                <label>Email</label>
                <input id="auth-email" type="email" placeholder="you@example.com" required />
                <label>Password</label>
                <input id="auth-password" type="password" placeholder="Password (8+ chars)" required minlength="8" />
                ${isRegister ? '<label>Role</label><select id="auth-role"><option value="student">Student</option><option value="teacher">Teacher</option></select>' : ''}
                <button type="submit">${isRegister ? 'Create Account' : 'Sign In'}</button>
              </form>
              <div class="switch">
                ${isRegister
                  ? 'Already have an account? <a onclick="state.screen=\'login\';renderFull()">Sign in</a>'
                  : 'No account? <a onclick="state.screen=\'register\';renderFull()">Register</a>'}
              </div>
            </div>
          </div>`;

        document.getElementById('auth-form').onsubmit = async (e) => {
          e.preventDefault();
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;
          const btn = e.target.querySelector('button');
          btn.disabled = true;
          btn.textContent = 'Loading...';
          try {
            if (isRegister) {
              const name = document.getElementById('auth-name').value;
              const role = document.getElementById('auth-role').value;
              await api('/api/auth/register', {
                method: 'POST',
                body: JSON.stringify({ email, password, displayName: name, role }),
              });
            }
            await login(email, password);
          } catch (err) {
            document.getElementById('auth-error').innerHTML = `<div class="auth-error">${err.message}</div>`;
            btn.disabled = false;
            btn.textContent = isRegister ? 'Create Account' : 'Sign In';
          }
        };
        return;
      }

      // Chat screen — full rebuild
      renderedSessionId = state.activeSessionId;
      const activeSession = state.sessions.find(s => s.id === state.activeSessionId);
      app.innerHTML = `
        <div class="chat-app">
          <div class="sidebar">
            <div class="sidebar-header">
              <h2>Chats</h2>
              <button onclick="createSession()">+ New</button>
            </div>
            <div class="session-list">
              ${state.sessions.map(s => `
                <div class="session-item ${s.id === state.activeSessionId ? 'active' : ''}"
                     onclick="selectSession('${s.id}')">
                  ${escapeHtml(s.title) || 'Untitled'}
                </div>
              `).join('')}
            </div>
            <div class="sidebar-footer">
              <span>${escapeHtml(state.user?.displayName || state.user?.email || '')}</span>
              <button onclick="logout()">Logout</button>
            </div>
          </div>
          <div class="chat-main">
            ${activeSession ? `
              <div class="chat-header">
                <h3>${escapeHtml(activeSession.title || 'Chat')}</h3>
                <span class="connection-badge ${state.isConnected ? 'connected' : 'disconnected'}">
                  ${state.isConnected ? 'Connected' : 'Disconnected'}
                </span>
              </div>
              <div class="messages" id="messages">
                ${state.messages.filter(m => m.role !== 'plugin').map(m =>
                  `<div class="message ${m.role}">${escapeHtml(m.content)}</div>`
                ).join('')}
              </div>
              <div class="input-area">
                <textarea id="chat-input" placeholder="Ask me anything or try "I want to practice math!""
                          rows="1"></textarea>
                <button onclick="handleSend()">Send</button>
              </div>
            ` : `
              <div class="empty-state">
                <h3>Welcome to ChatWeave!</h3>
                <p>Your AI learning buddy. Pick an app below or start a new chat!</p>
                <div class="app-discovery" id="app-discovery"></div>
              </div>
            `}
          </div>
        </div>`;

      // Set up input handler
      const input = document.getElementById('chat-input');
      if (input) {
        input.focus();
        input.onkeydown = (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        };
        input.oninput = () => {
          input.style.height = 'auto';
          input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        };
      }

      // Load app discovery if empty state is shown
      if (!activeSession) {
        loadAppDiscovery();
      }
    }

    // ========== App Discovery ==========
    const APP_META = {
      'chess-game':     { emoji: '\u265E', color: '#8B5CF6', prompt: "Let's play chess!" },
      'math-quest':     { emoji: '\u2795', color: '#F59E0B', prompt: 'I want to practice math!' },
      'word-lab':       { emoji: '\uD83D\uDCDA', color: '#10B981', prompt: 'Help me learn new words!' },
      'money-sense':    { emoji: '\uD83D\uDCB0', color: '#3B82F6', prompt: 'Teach me about money!' },
      'fact-or-fiction': { emoji: '\uD83D\uDD0D', color: '#EF4444', prompt: 'How do I spot fake news?' },
    };

    async function loadAppDiscovery() {
      const container = document.getElementById('app-discovery');
      if (!container) return;
      try {
        const res = await fetch('/api/plugins');
        const data = await res.json();
        const displayOrder = ['chess-game', 'money-sense', 'fact-or-fiction', 'math-quest', 'word-lab'];
        const plugins = (data.plugins || []).filter(p => p.is_enabled)
          .sort((a, b) => (displayOrder.indexOf(a.id) === -1 ? 99 : displayOrder.indexOf(a.id)) - (displayOrder.indexOf(b.id) === -1 ? 99 : displayOrder.indexOf(b.id)));
        container.innerHTML = plugins.map(p => {
          const meta = APP_META[p.id] || { emoji: '\uD83D\uDD27', color: '#6366F1', prompt: '' };
          return `
            <div class="app-card" data-prompt="${escapeHtml(meta.prompt)}">
              <div class="app-card-icon" style="background:${meta.color}18;color:${meta.color}">
                ${meta.emoji}
              </div>
              <div class="app-card-info">
                <div class="app-card-name">${escapeHtml(p.name)}</div>
                <div class="app-card-desc">${escapeHtml(p.description || '')}</div>
                ${meta.prompt ? `<div class="app-card-try">Try: &quot;${escapeHtml(meta.prompt)}&quot;</div>` : ''}
              </div>
            </div>
          `;
        }).join('');

        // Attach click handlers via event delegation
        container.addEventListener('click', (e) => {
          const card = e.target.closest('.app-card');
          if (card && card.dataset.prompt) {
            startAppFromDiscovery(card.dataset.prompt);
          }
        });
      } catch {}
    }

    async function startAppFromDiscovery(prompt) {
      if (!prompt) return;
      if (!state.activeSessionId) {
        await createSession();
      }
      // renderFull() ran synchronously inside createSession/selectSession,
      // but give the DOM one frame to settle
      await new Promise(r => requestAnimationFrame(r));
      const input = document.getElementById('chat-input');
      if (input) {
        input.value = prompt;
        handleSend();
      }
    }

    // ========== Init ==========
    if (state.token) {
      connectSocket();
      loadSessions();
    }
    renderFull();
  </script>
</body>
</html>
