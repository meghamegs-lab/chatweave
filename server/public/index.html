<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatWeave</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #f8f9fa; --bg-card: #fff; --bg-input: #fff; --bg-msg-user: #4263eb;
      --bg-msg-ai: #f1f3f5; --text: #212529; --text-dim: #868e96;
      --text-user: #fff; --text-ai: #212529; --border: #dee2e6;
      --primary: #4263eb; --primary-hover: #3b5bdb; --shadow: rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; width: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

    /* Auth screens */
    .auth-container { display: flex; align-items: center; justify-content: center; width: 100%; height: 100vh; }
    .auth-card { background: var(--bg-card); border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 4px 24px var(--shadow); }
    .auth-card h1 { font-size: 24px; margin-bottom: 4px; text-align: center; }
    .auth-card p { color: var(--text-dim); font-size: 14px; text-align: center; margin-bottom: 24px; }
    .auth-card label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; margin-top: 12px; }
    .auth-card input, .auth-card select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
    .auth-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(66,99,235,0.15); }
    .auth-card button { width: 100%; padding: 11px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .auth-card button:hover { background: var(--primary-hover); }
    .auth-card button:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-card .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-dim); }
    .auth-card .switch a { color: var(--primary); cursor: pointer; text-decoration: none; }
    .auth-error { background: #fff5f5; color: #c92a2a; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 8px; }

    /* Chat layout */
    .chat-app { display: flex; width: 100%; height: 100vh; }
    .sidebar { width: 260px; min-width: 260px; flex-shrink: 0; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-header h2 { font-size: 16px; }
    .sidebar-header button { background: var(--primary); color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item:hover { background: var(--bg); }
    .session-item.active { background: #e7f0ff; color: var(--primary); font-weight: 600; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-dim); }
    .sidebar-footer button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px; }
    .sidebar-footer button:hover { color: #c92a2a; }

    /* Main chat area */
    .chat-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; }
    .chat-header h3 { font-size: 15px; font-weight: 600; }
    .connection-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
    .connection-badge.connected { background: #d3f9d8; color: #2b8a3e; }
    .connection-badge.disconnected { background: #ffe3e3; color: #c92a2a; }

    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
    .message.user { align-self: flex-end; background: var(--bg-msg-user); color: var(--text-user); border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: var(--bg-msg-ai); color: var(--text-ai); border-bottom-left-radius: 4px; }
    .message.system { align-self: center; background: #fff9db; color: #e67700; font-size: 12px; padding: 6px 12px; border-radius: 8px; max-width: 90%; }
    .message.streaming { border: 1px solid var(--border); }
    .typing-indicator { align-self: flex-start; color: var(--text-dim); font-size: 13px; padding: 8px 0; }
    .typing-indicator span { animation: blink 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    /* Waiting bubble — shown between send and stream start */
    .waiting-bubble { align-self: flex-start; display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-radius: 16px; border-bottom-left-radius: 4px; background: var(--bg-msg-ai); max-width: 120px; }
    .waiting-bubble .dot-container { display: flex; gap: 5px; }
    .waiting-bubble .dot { width: 8px; height: 8px; border-radius: 50%; background: #999; animation: waitBounce 1.4s ease-in-out infinite; }
    .waiting-bubble .dot:nth-child(2) { animation-delay: 0.2s; }
    .waiting-bubble .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes waitBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }

    /* Plugin iframe */
    .plugin-frame { align-self: flex-start; width: 95%; max-width: 680px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--bg-card); margin: 4px 0; }
    .plugin-frame-header { padding: 8px 12px; background: var(--bg); font-size: 12px; font-weight: 600; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; }
    .plugin-frame-header .badge { background: #d3f9d8; color: #2b8a3e; padding: 2px 8px; border-radius: 8px; font-size: 11px; }
    .plugin-frame iframe { width: 100%; border: none; display: block; }
    .plugin-loading { display: flex; align-items: center; gap: 12px; padding: 20px 24px; color: var(--text-dim); font-size: 14px; }
    .plugin-loading-dots { display: flex; gap: 4px; }
    .plugin-loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: pluginBounce 1.4s ease-in-out infinite; }
    .plugin-loading-dots span:nth-child(2) { animation-delay: 0.16s; }
    .plugin-loading-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes pluginBounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* Input area */
    .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-card); display: flex; gap: 10px; }
    .input-area textarea { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 120px; }
    .input-area textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(66,99,235,0.15); }
    .input-area button { padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .input-area button:hover { background: var(--primary-hover); }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); gap: 8px; text-align: center; width: 100%; overflow-y: auto; padding: 24px; }
    .empty-state h3 { font-size: 24px; color: var(--text); font-weight: 700; }
    .empty-state p { font-size: 14px; }

    /* Admin Panel */
    .admin-panel { flex: 1; overflow-y: auto; padding: 24px; }
    .admin-panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .admin-panel .admin-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
    .admin-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
    .admin-tab { padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text-dim); border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .admin-tab:hover { color: var(--text); }
    .admin-section { margin-bottom: 24px; }
    .admin-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .plugin-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; background: var(--bg-card); }
    .plugin-row-info { display: flex; align-items: center; gap: 12px; }
    .plugin-row-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .plugin-row-name { font-size: 14px; font-weight: 600; }
    .plugin-row-desc { font-size: 12px; color: var(--text-dim); }
    .plugin-row-status { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
    .plugin-row-status.on { background: #d3f9d8; color: #2b8a3e; }
    .plugin-row-status.off { background: #ffe3e3; color: #c92a2a; }
    .toggle-switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
    .toggle-switch input { display: none; }
    .toggle-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #ced4da; border-radius: 24px; transition: 0.3s; }
    .toggle-slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--primary); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
    .rule-card { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; background: var(--bg-card); }
    .rule-card-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .rule-card-desc { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .severity-badge { font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 600; text-transform: uppercase; }
    .severity-badge.critical { background: #ffe3e3; color: #c92a2a; }
    .severity-badge.warning { background: #fff9db; color: #e67700; }
    .severity-badge.info { background: #d0ebff; color: #1971c2; }
    .violation-row { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; background: var(--bg-card); display: flex; justify-content: space-between; align-items: center; }
    .violation-row-info { font-size: 13px; }
    .violation-row-action { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
    .violation-row-action.flagged { background: #fff9db; color: #e67700; }
    .violation-row-action.disabled { background: #ffe3e3; color: #c92a2a; }
    .violation-row-action.removed { background: #868e96; color: #fff; }
    .violation-row-date { font-size: 11px; color: var(--text-dim); }
    .admin-btn { padding: 6px 14px; font-size: 12px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; }
    .admin-btn-danger { background: #ffe3e3; color: #c92a2a; }
    .admin-btn-danger:hover { background: #ffc9c9; }
    .sidebar-admin-btn { display: block; width: calc(100% - 16px); margin: 8px; padding: 10px 12px; background: #f8f0ff; border: 1px solid #d0bfff; border-radius: 8px; color: #7048e8; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; }
    .sidebar-admin-btn:hover { background: #e5dbff; }
    .admin-empty { text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px; }
    .submission-card { padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; background: var(--bg-card); }
    .submission-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .submission-card-name { font-size: 15px; font-weight: 700; }
    .submission-card-id { font-size: 11px; color: var(--text-dim); font-family: monospace; }
    .submission-card-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; line-height: 1.6; }
    .submission-card-meta strong { color: var(--text); }
    .submission-card-tools { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
    .submission-tool-tag { display: inline-block; background: #edf2ff; color: #4263eb; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 4px; margin-bottom: 4px; }
    .submission-actions { display: flex; gap: 8px; align-items: center; }
    .submission-actions input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
    .admin-btn-approve { background: #d3f9d8; color: #2b8a3e; }
    .admin-btn-approve:hover { background: #b2f2bb; }
    .admin-btn-reject { background: #ffe3e3; color: #c92a2a; }
    .admin-btn-reject:hover { background: #ffc9c9; }
    .submission-status-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
    .submission-status-badge.pending { background: #fff9db; color: #e67700; }
    .submission-status-badge.approved { background: #d3f9d8; color: #2b8a3e; }
    .submission-status-badge.rejected { background: #ffe3e3; color: #c92a2a; }

    /* Developer Submit Page */
    .submit-container { display: flex; align-items: flex-start; justify-content: center; width: 100%; min-height: 100vh; padding: 40px 20px; background: var(--bg); }
    .submit-card { background: var(--bg-card); border-radius: 14px; padding: 36px 40px; width: 600px; max-width: 100%; box-shadow: 0 4px 24px var(--shadow); }
    .submit-card h1 { font-size: 22px; margin-bottom: 4px; }
    .submit-card .submit-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.5; }
    .submit-card label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; margin-top: 16px; }
    .submit-card label .required { color: #e03131; }
    .submit-card input, .submit-card textarea, .submit-card select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
    .submit-card input:focus, .submit-card textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(66,99,235,0.15); }
    .submit-card textarea { resize: vertical; min-height: 60px; }
    .submit-card .field-hint { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
    .submit-card button[type="submit"] { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 24px; }
    .submit-card button[type="submit"]:hover { background: var(--primary-hover); }
    .submit-card button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .submit-card .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-dim); }
    .submit-card .switch a { color: var(--primary); cursor: pointer; text-decoration: none; }
    .submit-success { background: #d3f9d8; color: #2b8a3e; padding: 14px 16px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
    .submit-success strong { display: block; margin-bottom: 4px; }
    .tool-entry { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 8px; position: relative; }
    .tool-entry label { margin-top: 8px; }
    .tool-entry label:first-child { margin-top: 0; }
    .tool-remove { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #c92a2a; cursor: pointer; font-size: 16px; padding: 2px 6px; }
    .tool-remove:hover { background: #ffe3e3; border-radius: 4px; }
    .add-tool-btn { display: inline-block; margin-top: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; border: 1px dashed var(--primary); color: var(--primary); background: none; border-radius: 6px; cursor: pointer; }
    .add-tool-btn:hover { background: #edf2ff; }

    /* App Discovery Grid */
    .app-discovery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; width: 100%; max-width: 740px; margin-top: 20px; }
    .app-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; text-align: left; transition: transform 0.15s, box-shadow 0.15s; }
    .app-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px var(--shadow); }
    .app-card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .app-card-info { min-width: 0; }
    .app-card-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .app-card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .app-card-try { font-size: 11px; color: var(--primary); margin-top: 6px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API = '';
    let state = {
      screen: 'login',
      token: null,
      user: null,
      sessions: [],
      activeSessionId: null,
      messages: [],
      streamingText: '',
      isStreaming: false,
      generationId: null,
      isConnected: false,
      socket: null,
      activePlugins: {},
    };

    // Track which session the chat shell was last rendered for
    let renderedSessionId = null;

    // Try restore from localStorage
    const saved = localStorage.getItem('chatbridge-auth');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed.token) {
          state.token = parsed.token;
          state.user = parsed.user;
          state.screen = 'chat';
        }
      } catch {}
    }

    // ========== API helpers ==========
    async function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json', ...opts.headers };
      if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
      const res = await fetch(`${API}${path}`, { ...opts, headers, credentials: 'include' });
      if (res.status === 401) {
        logout();
        throw new Error('Session expired. Please log in again.');
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Request failed');
      return data;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        const msgs = document.getElementById('messages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
      });
    }

    // ========== Auth ==========
    async function login(email, password) {
      const loginData = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });
      state.token = loginData.token;
      state.user = loginData.user;
      localStorage.setItem('chatbridge-auth', JSON.stringify({ token: state.token, user: state.user }));
      state.screen = 'chat';
      connectSocket();
      loadSessions();
      renderFull();
    }

    function logout() {
      state.token = null;
      state.user = null;
      state.sessions = [];
      state.activeSessionId = null;
      state.messages = [];
      state.screen = 'login';
      state.activePlugins = {};
      renderedSessionId = null;
      localStorage.removeItem('chatbridge-auth');
      if (state.socket) { state.socket.disconnect(); state.socket = null; }
      renderFull();
    }

    // ========== Sessions ==========
    async function loadSessions() {
      try {
        const data = await api('/api/chat/sessions');
        state.sessions = data.sessions || [];
        updateSidebar();
      } catch {}
    }

    async function createSession() {
      try {
        const data = await api('/api/chat/sessions', {
          method: 'POST',
          body: JSON.stringify({ title: 'New Chat' }),
        });
        state.sessions.unshift(data.session);
        await selectSession(data.session.id);
      } catch (err) {
        console.error('createSession error:', err);
        alert('Failed to create session: ' + err.message);
      }
    }

    async function selectSession(id) {
      state.activeSessionId = id;
      state.activePlugins = {};
      state.isStreaming = false;
      state.streamingText = '';
      renderedSessionId = null; // force full re-render of chat area
      try {
        const data = await api(`/api/chat/sessions/${id}`);
        state.messages = data.messages || [];
      } catch {
        state.messages = [];
      }
      renderFull();
      scrollToBottom();
    }

    // ========== Socket.io ==========
    function connectSocket() {
      if (state.socket) state.socket.disconnect();
      const socket = io(window.location.origin, { auth: { token: state.token }, transports: ['websocket', 'polling'] });

      socket.on('connect', () => {
        state.isConnected = true;
        updateConnectionBadge();
      });
      socket.on('disconnect', () => {
        state.isConnected = false;
        updateConnectionBadge();
      });

      // --- Streaming: all incremental DOM updates, never full render ---
      socket.on('chat:stream:start', (data) => {
        state.isStreaming = true;
        state.streamingText = '';
        state.generationId = data.generationId;
        removeWaitingBubble();
        // Add streaming bubble to messages area
        const msgs = document.getElementById('messages');
        if (msgs) {
          // Remove any old streaming div
          const old = document.getElementById('streaming-msg');
          if (old) old.remove();
          const div = document.createElement('div');
          div.id = 'streaming-msg';
          div.className = 'message assistant streaming';
          div.innerHTML = '<span class="typing-indicator"><span>.</span><span>.</span><span>.</span></span>';
          msgs.appendChild(div);
          updateInputArea();
          scrollToBottom();
        }
      });

      socket.on('chat:stream', (data) => {
        removeWaitingBubble();
        state.streamingText += data.token;
        const el = document.getElementById('streaming-msg');
        if (el) {
          el.textContent = state.streamingText;
        }
        scrollToBottom();
      });

      socket.on('chat:stream:end', (data) => {
        state.messages.push({ role: 'assistant', content: state.streamingText, id: data.messageId });
        state.isStreaming = false;
        state.streamingText = '';
        state.generationId = null;
        // Replace streaming div with final message
        const el = document.getElementById('streaming-msg');
        if (el) el.remove();
        appendMessageDiv({ role: 'assistant', content: state.messages[state.messages.length - 1].content });
        updateInputArea();
        scrollToBottom();
      });

      socket.on('chat:error', (data) => {
        removeWaitingBubble();
        state.isStreaming = false;
        state.streamingText = '';
        state.generationId = null;
        const el = document.getElementById('streaming-msg');
        if (el) el.remove();
        state.messages.push({ role: 'system', content: data.message });
        appendMessageDiv({ role: 'system', content: data.message });
        updateInputArea();
      });

      // Show thinking indicator while LLM waits for plugin tool result
      socket.on('chat:tool:executing', () => {
        showWaitingBubble();
        scrollToBottom();
      });

      socket.on('chat:tool:done', () => {
        removeWaitingBubble();
      });

      socket.on('plugin:invoke', (data) => {
        handlePluginInvoke(data);
      });

      state.socket = socket;
    }

    // ========== Incremental DOM helpers ==========

    function appendMessageDiv(msg) {
      const msgs = document.getElementById('messages');
      if (!msgs) return;
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      div.textContent = msg.content;
      msgs.appendChild(div);
    }

    function updateConnectionBadge() {
      const badge = document.querySelector('.connection-badge');
      if (badge) {
        badge.className = `connection-badge ${state.isConnected ? 'connected' : 'disconnected'}`;
        badge.textContent = state.isConnected ? 'Connected' : 'Disconnected';
      }
    }

    function updateSidebar() {
      const list = document.querySelector('.session-list');
      if (!list) return;
      list.innerHTML = state.sessions.map(s => `
        <div class="session-item ${s.id === state.activeSessionId ? 'active' : ''}"
             onclick="selectSession('${s.id}')">
          ${escapeHtml(s.title) || 'Untitled'}
        </div>
      `).join('');
    }

    function updateInputArea() {
      const area = document.querySelector('.input-area');
      if (!area) return;
      const wasValue = document.getElementById('chat-input')?.value || '';
      area.innerHTML = `
        <textarea id="chat-input" placeholder="Ask me anything or try "I want to practice math!""
                  rows="1" ${state.isStreaming ? 'disabled' : ''}></textarea>
        ${state.isStreaming
          ? '<button onclick="cancelGeneration()" style="background:#c92a2a">Stop</button>'
          : '<button onclick="handleSend()">Send</button>'}
      `;
      const input = document.getElementById('chat-input');
      if (input) {
        input.value = wasValue;
        if (!state.isStreaming) input.focus();
        input.onkeydown = (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        };
        input.oninput = () => {
          input.style.height = 'auto';
          input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        };
      }
    }

    // ========== Plugin handling ==========
    async function handlePluginInvoke(data) {
      const { toolCallId, pluginId, toolName, parameters, sessionId } = data;

      try {
        const pluginData = await api(`/api/plugins/${pluginId}`);
        const plugin = pluginData.plugin;
        const manifest = typeof plugin.manifest === 'string' ? JSON.parse(plugin.manifest) : plugin;
        const iframeUrl = manifest.iframe_url;
        const instanceId = `${pluginId}_${Date.now()}`;

        let existingInstance = Object.entries(state.activePlugins).find(([, p]) => p.pluginId === pluginId);
        let targetInstanceId;

        if (existingInstance) {
          targetInstanceId = existingInstance[0];
        } else {
          targetInstanceId = instanceId;
          state.activePlugins[targetInstanceId] = {
            pluginId,
            pluginName: plugin.name || pluginId,
            iframeUrl,
            height: manifest.ui?.default_height || 600,
            status: 'loading',
            pendingInvocations: [],
          };
          state.messages.push({ role: 'plugin', pluginId, instanceId: targetInstanceId });
          // Append plugin frame directly to DOM — NO full render
          appendPluginFrame(targetInstanceId, state.activePlugins[targetInstanceId]);
          scrollToBottom();
        }

        state.activePlugins[targetInstanceId].pendingInvocations.push({ toolCallId, toolName, parameters });

        if (state.activePlugins[targetInstanceId].status === 'ready') {
          sendToolInvoke(targetInstanceId, toolCallId, toolName, parameters);
        }
      } catch (err) {
        console.error('Plugin invoke error:', err);
        state.socket.emit('plugin:result', { toolCallId, result: { error: err.message } });
      }
    }

    function appendPluginFrame(instanceId, plugin) {
      const msgs = document.getElementById('messages');
      if (!msgs) return;

      const frame = document.createElement('div');
      frame.className = 'plugin-frame';
      frame.id = `plugin-frame-${instanceId}`;

      const header = document.createElement('div');
      header.className = 'plugin-frame-header';
      header.innerHTML = `${escapeHtml(plugin.pluginName)} <span style="font-weight:400;font-size:11px;">Loading...</span>`;
      frame.appendChild(header);

      const loading = document.createElement('div');
      loading.className = 'plugin-loading';
      loading.id = `plugin-loading-${instanceId}`;
      loading.innerHTML = `<div class="plugin-loading-dots"><span></span><span></span><span></span></div> Loading ${escapeHtml(plugin.pluginName)}...`;
      frame.appendChild(loading);

      const iframe = document.createElement('iframe');
      iframe.id = `plugin-iframe-${instanceId}`;
      iframe.src = plugin.iframeUrl;
      iframe.sandbox = 'allow-scripts allow-same-origin allow-popups';
      iframe.style.cssText = `width:100%;border:none;display:none;height:${plugin.height}px;`;
      frame.appendChild(iframe);

      msgs.appendChild(frame);
    }

    function sendToolInvoke(instanceId, toolCallId, toolName, parameters) {
      const plugin = state.activePlugins[instanceId];
      if (!plugin) return;
      const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
      if (!iframe) return;

      const msgId = `msg_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
      iframe.contentWindow.postMessage({
        type: 'TOOL_INVOKE',
        messageId: msgId,
        payload: { toolName, parameters },
      }, '*');

      if (!window._toolCallMap) window._toolCallMap = {};
      window._toolCallMap[msgId] = toolCallId;
    }

    // Listen for plugin messages
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || typeof data.type !== 'string') return;

      switch (data.type) {
        case 'PLUGIN_READY': {
          for (const [instanceId, plugin] of Object.entries(state.activePlugins)) {
            const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
            if (iframe && iframe.contentWindow === event.source) {
              plugin.status = 'ready';
              // Send init
              iframe.contentWindow.postMessage({
                type: 'PLUGIN_INIT',
                messageId: `msg_${Date.now()}`,
                payload: { sessionId: state.activeSessionId, theme: 'light', locale: 'en', config: {}, user: state.user ? { role: state.user.role, displayName: state.user.displayName, email: state.user.email } : null },
              }, '*');
              // Show iframe, hide loading
              const loading = document.getElementById(`plugin-loading-${instanceId}`);
              if (loading) loading.remove();
              iframe.style.display = 'block';
              // Auto-resize: single deferred check after plugin mounts
              // Avoids feedback loop where scrollHeight grows with iframe height
              setTimeout(() => {
                try {
                  const body = iframe.contentDocument?.body;
                  if (body) {
                    // Temporarily shrink iframe to measure true content height
                    const origHeight = iframe.style.height;
                    iframe.style.height = '0px';
                    const contentHeight = body.scrollHeight + 20;
                    iframe.style.height = origHeight;
                    const finalHeight = Math.max(contentHeight, plugin.height || 600);
                    if (finalHeight !== plugin.height) {
                      iframe.style.height = finalHeight + 'px';
                      plugin.height = finalHeight;
                    }
                  }
                } catch(e) { /* cross-origin, ignore */ }
              }, 1500);
              // Update header
              const frame = document.getElementById(`plugin-frame-${instanceId}`);
              if (frame) {
                const header = frame.querySelector('.plugin-frame-header');
                if (header) header.innerHTML = escapeHtml(plugin.pluginName);
              }
              // Process pending invocations
              for (const inv of plugin.pendingInvocations || []) {
                setTimeout(() => sendToolInvoke(instanceId, inv.toolCallId, inv.toolName, inv.parameters), 100);
              }
              plugin.pendingInvocations = [];
              // NO render() call — just direct DOM manipulation above
            }
          }
          break;
        }
        case 'TOOL_RESULT': {
          const toolCallId = window._toolCallMap?.[data.messageId];
          if (toolCallId && state.socket) {
            state.socket.emit('plugin:result', { toolCallId, result: data.payload?.result });
            delete window._toolCallMap[data.messageId];
          }
          break;
        }
        case 'PLUGIN_COMPLETE': {
          for (const [instanceId, plugin] of Object.entries(state.activePlugins)) {
            const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
            if (iframe && iframe.contentWindow === event.source) {
              plugin.status = 'completed';
              plugin.completionSummary = data.payload?.summary || 'Completed';
              // Update header with badge
              const frame = document.getElementById(`plugin-frame-${instanceId}`);
              if (frame) {
                const header = frame.querySelector('.plugin-frame-header');
                if (header) header.innerHTML = `${escapeHtml(plugin.pluginName)} <span class="badge">Completed</span>`;
              }
              if (state.socket) {
                state.socket.emit('plugin:complete', {
                  sessionId: state.activeSessionId,
                  pluginId: plugin.pluginId,
                  instanceId,
                  event: data.payload?.event,
                  completionData: data.payload?.data || {},
                  summary: data.payload?.summary || '',
                });
              }
              // NO render() call
            }
          }
          break;
        }
        case 'PLUGIN_RESIZE': {
          for (const [instanceId, plugin] of Object.entries(state.activePlugins)) {
            const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
            if (iframe && iframe.contentWindow === event.source) {
              plugin.height = data.payload?.height || 400;
              iframe.style.height = plugin.height + 'px';
              // NO render() call
            }
          }
          break;
        }
        case 'AUTH_REQUEST': {
          // Plugin is requesting OAuth authentication
          const pluginId = data.pluginId;
          const sourceWindow = event.source;
          handleOAuthRequest(pluginId, sourceWindow);
          break;
        }
        case 'OAUTH_COMPLETE': {
          // OAuth popup completed — forward result to the plugin iframe
          const pluginId = data.pluginId;
          for (const [instanceId, plugin] of Object.entries(state.activePlugins)) {
            if (plugin.pluginId === pluginId) {
              const iframe = document.getElementById(`plugin-iframe-${instanceId}`);
              if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                  type: 'AUTH_RESULT',
                  pluginId,
                  success: true,
                }, '*');
              }
            }
          }
          break;
        }
      }
    });

    // Handle OAuth authorization request from a plugin
    async function handleOAuthRequest(pluginId, sourceWindow) {
      // Open demo Google sign-in page (simulates real OAuth account picker)
      const popup = window.open(
        `${API_BASE}/api/oauth/${pluginId}/demo-login`,
        `oauth_${pluginId}`,
        'width=450,height=550,menubar=no,toolbar=no,location=no'
      );

      if (!popup || popup.closed) {
        console.warn('OAuth popup blocked — user must allow popups');
      }
      // OAUTH_COMPLETE message from the popup callback will trigger AUTH_RESULT to the plugin
    }

    // ========== Send message ==========
    function sendMessage(text) {
      if (!text.trim() || !state.activeSessionId || state.isStreaming) return;
      state.messages.push({ role: 'user', content: text });
      state.socket.emit('chat:message', { sessionId: state.activeSessionId, content: text });
      // Append directly — no full render
      appendMessageDiv({ role: 'user', content: text });
      // Show waiting bubble while LLM processes
      showWaitingBubble();
      scrollToBottom();
    }

    function showWaitingBubble() {
      removeWaitingBubble();
      const msgs = document.getElementById('messages');
      if (!msgs) return;
      const bubble = document.createElement('div');
      bubble.id = 'waiting-bubble';
      bubble.className = 'waiting-bubble';
      bubble.innerHTML = '<div class="dot-container"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      msgs.appendChild(bubble);
    }

    function removeWaitingBubble() {
      const el = document.getElementById('waiting-bubble');
      if (el) el.remove();
    }

    function cancelGeneration() {
      if (state.generationId && state.socket) {
        state.socket.emit('chat:cancel', { generationId: state.generationId });
        removeWaitingBubble();
        state.isStreaming = false;
        if (state.streamingText) {
          state.messages.push({ role: 'assistant', content: state.streamingText + ' [cancelled]' });
        }
        state.streamingText = '';
        state.generationId = null;
        const el = document.getElementById('streaming-msg');
        if (el) el.remove();
        if (state.messages.length > 0) {
          const last = state.messages[state.messages.length - 1];
          if (last.content.endsWith('[cancelled]')) appendMessageDiv(last);
        }
        updateInputArea();
      }
    }

    function handleSend() {
      const input = document.getElementById('chat-input');
      if (input && input.value.trim()) {
        sendMessage(input.value);
        input.value = '';
        input.style.height = 'auto';
      }
    }

    // ========== Full Render (only for screen/session changes) ==========
    function renderFull() {
      const app = document.getElementById('app');

      if (state.screen === 'login' || state.screen === 'register') {
        renderedSessionId = null;
        const isRegister = state.screen === 'register';
        app.innerHTML = `
          <div class="auth-container">
            <div class="auth-card">
              <h1>ChatWeave</h1>
              <p>${isRegister ? 'Create your account' : 'Sign in to start chatting'}</p>
              <div id="auth-error"></div>
              <form id="auth-form">
                ${isRegister ? '<label>Display Name</label><input id="auth-name" placeholder="Your name" required />' : ''}
                <label>Email</label>
                <input id="auth-email" type="email" placeholder="you@example.com" required />
                <label>Password</label>
                <input id="auth-password" type="password" placeholder="Password (8+ chars)" required minlength="8" />
                ${isRegister ? '<label>Role</label><select id="auth-role"><option value="student">Student</option><option value="teacher">Teacher</option></select>' : ''}
                <button type="submit">${isRegister ? 'Create Account' : 'Sign In'}</button>
              </form>
              <div class="switch">
                ${isRegister
                  ? 'Already have an account? <a onclick="state.screen=\'login\';renderFull()">Sign in</a>'
                  : 'No account? <a onclick="state.screen=\'register\';renderFull()">Register</a>'}
              </div>
              <div class="switch" style="margin-top:8px">
                <a href="/submit">Developer? Submit your learning app</a>
              </div>
            </div>
          </div>`;

        document.getElementById('auth-form').onsubmit = async (e) => {
          e.preventDefault();
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;
          const btn = e.target.querySelector('button');
          btn.disabled = true;
          btn.textContent = 'Loading...';
          try {
            if (isRegister) {
              const name = document.getElementById('auth-name').value;
              const role = document.getElementById('auth-role').value;
              await api('/api/auth/register', {
                method: 'POST',
                body: JSON.stringify({ email, password, displayName: name, role }),
              });
            }
            await login(email, password);
          } catch (err) {
            document.getElementById('auth-error').innerHTML = `<div class="auth-error">${err.message}</div>`;
            btn.disabled = false;
            btn.textContent = isRegister ? 'Create Account' : 'Sign In';
          }
        };
        return;
      }

      // Chat screen — full rebuild
      renderedSessionId = state.activeSessionId;
      const activeSession = state.sessions.find(s => s.id === state.activeSessionId);
      app.innerHTML = `
        <div class="chat-app">
          <div class="sidebar">
            <div class="sidebar-header">
              <h2>Chats</h2>
              <button onclick="createSession()">+ New</button>
            </div>
            <div class="session-list">
              ${state.sessions.map(s => `
                <div class="session-item ${s.id === state.activeSessionId ? 'active' : ''}"
                     onclick="selectSession('${s.id}')">
                  ${escapeHtml(s.title) || 'Untitled'}
                </div>
              `).join('')}
            </div>
            ${state.user?.role === 'teacher' || state.user?.role === 'admin' ? `
              <button class="sidebar-admin-btn" onclick="showAdminPanel()">
                \u2699\uFE0F Teacher Controls
              </button>
            ` : ''}
            <div class="sidebar-footer">
              <span>${escapeHtml(state.user?.displayName || state.user?.email || '')}${state.user?.role === 'teacher' ? ' (Teacher)' : state.user?.role === 'admin' ? ' (Admin)' : ''}</span>
              <button onclick="logout()">Logout</button>
            </div>
          </div>
          <div class="chat-main">
            ${activeSession ? `
              <div class="chat-header">
                <h3>${escapeHtml(activeSession.title || 'Chat')}</h3>
                <span class="connection-badge ${state.isConnected ? 'connected' : 'disconnected'}">
                  ${state.isConnected ? 'Connected' : 'Disconnected'}
                </span>
              </div>
              <div class="messages" id="messages">
                ${state.messages.filter(m => m.role !== 'plugin').map(m =>
                  `<div class="message ${m.role}">${escapeHtml(m.content)}</div>`
                ).join('')}
              </div>
              <div class="input-area">
                <textarea id="chat-input" placeholder="Ask me anything or try "I want to practice math!""
                          rows="1"></textarea>
                <button onclick="handleSend()">Send</button>
              </div>
            ` : `
              <div class="empty-state">
                <h3>Welcome to ChatWeave!</h3>
                <p>Your AI learning buddy. Pick an app below or start a new chat!</p>
                <div class="app-discovery" id="app-discovery"></div>
              </div>
            `}
          </div>
        </div>`;

      // Set up input handler
      const input = document.getElementById('chat-input');
      if (input) {
        input.focus();
        input.onkeydown = (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        };
        input.oninput = () => {
          input.style.height = 'auto';
          input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        };
      }

      // Load app discovery if empty state is shown
      if (!activeSession) {
        loadAppDiscovery();
      }
    }

    // ========== App Discovery ==========
    const APP_META = {
      'chess-game':     { emoji: '\u265E', color: '#8B5CF6', prompt: "Let's play chess!" },
      'math-quest':     { emoji: '\u2795', color: '#F59E0B', prompt: 'I want to practice math!' },
      'word-lab':       { emoji: '\uD83D\uDCDA', color: '#10B981', prompt: 'Help me learn new words!' },
      'money-sense':    { emoji: '\uD83D\uDCB0', color: '#3B82F6', prompt: 'Teach me about money!' },
      'fact-or-fiction': { emoji: '\uD83D\uDD0D', color: '#EF4444', prompt: 'How do I spot fake news?' },
      'science-quiz':   { emoji: '\uD83E\uDDEA', color: '#06B6D4', prompt: 'Quiz me on science!' },
      'study-planner':  { emoji: '\uD83D\uDCC5', color: '#8B5CF6', prompt: 'Help me create a study plan!' },
    };

    async function loadAppDiscovery() {
      const container = document.getElementById('app-discovery');
      if (!container) return;
      try {
        const res = await fetch('/api/plugins');
        const data = await res.json();
        const displayOrder = ['chess-game', 'money-sense', 'fact-or-fiction', 'math-quest', 'word-lab', 'science-quiz', 'study-planner'];
        const plugins = (data.plugins || []).filter(p => p.is_enabled)
          .sort((a, b) => (displayOrder.indexOf(a.id) === -1 ? 99 : displayOrder.indexOf(a.id)) - (displayOrder.indexOf(b.id) === -1 ? 99 : displayOrder.indexOf(b.id)));
        container.innerHTML = plugins.map(p => {
          const meta = APP_META[p.id] || { emoji: '\uD83D\uDD27', color: '#6366F1', prompt: '' };
          return `
            <div class="app-card" data-prompt="${escapeHtml(meta.prompt)}">
              <div class="app-card-icon" style="background:${meta.color}18;color:${meta.color}">
                ${meta.emoji}
              </div>
              <div class="app-card-info">
                <div class="app-card-name">${escapeHtml(p.name)}</div>
                <div class="app-card-desc">${escapeHtml(p.description || '')}</div>
                ${meta.prompt ? `<div class="app-card-try">Try: &quot;${escapeHtml(meta.prompt)}&quot;</div>` : ''}
              </div>
            </div>
          `;
        }).join('');

        // Attach click handlers via event delegation
        container.addEventListener('click', (e) => {
          const card = e.target.closest('.app-card');
          if (card && card.dataset.prompt) {
            startAppFromDiscovery(card.dataset.prompt);
          }
        });
      } catch {}
    }

    async function startAppFromDiscovery(prompt) {
      if (!prompt) return;
      if (!state.activeSessionId) {
        await createSession();
      }
      // renderFull() ran synchronously inside createSession/selectSession,
      // but give the DOM one frame to settle
      await new Promise(r => requestAnimationFrame(r));
      const input = document.getElementById('chat-input');
      if (input) {
        input.value = prompt;
        handleSend();
      }
    }

    // ========== Teacher Admin Panel ==========
    let adminTab = 'plugins';

    function showAdminPanel() {
      state.activeSessionId = null;
      state.activePlugins = {};
      renderedSessionId = null;
      state.screen = 'admin';
      renderAdminPanel();
    }

            </div>
            <div class="admin-panel" id="admin-panel">

          </div>
        </div>`;
      loadAdminTab();
    }

    async function loadAdminTab() {
      // Update tab active states via data attribute
      const tabMap = { plugins: 'Learning Apps', submissions: 'Submissions', rules: 'Platform Rules', violations: 'Violations' };
      document.querySelectorAll('.admin-tab').forEach(t => {
        t.classList.toggle('active', t.textContent.trim() === tabMap[adminTab]);
      });

      const content = document.getElementById('admin-content');
      if (!content) return;

      if (adminTab === 'plugins') {
        await loadAdminPlugins(content);
      } else if (adminTab === 'submissions') {
        await loadAdminSubmissions(content);
      } else if (adminTab === 'rules') {
        await loadAdminRules(content);
      } else if (adminTab === 'violations') {
        await loadAdminViolations(content);
      }
    }

    async function loadAdminPlugins(container) {
      try {
        const data = await api('/api/plugins');
        const plugins = data.plugins || [];
        const displayOrder = ['chess-game', 'money-sense', 'fact-or-fiction', 'math-quest', 'word-lab', 'science-quiz', 'study-planner'];
        plugins.sort((a, b) => (displayOrder.indexOf(a.id) === -1 ? 99 : displayOrder.indexOf(a.id)) - (displayOrder.indexOf(b.id) === -1 ? 99 : displayOrder.indexOf(b.id)));

        container.innerHTML = `
          <div class="admin-section">
            <h3>Learning Apps <span style="font-weight:400;font-size:12px;color:var(--text-dim)">(${plugins.filter(p => p.is_enabled).length} of ${plugins.length} enabled)</span></h3>
            <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">Toggle apps on/off to control what students can access. Disabled apps are hidden from students and the AI will not launch them.</p>
            ${plugins.map(p => {
              const meta = APP_META[p.id] || { emoji: '\uD83D\uDD27', color: '#6366F1' };
              return `
                <div class="plugin-row">
                  <div class="plugin-row-info">
                    <div class="plugin-row-icon" style="background:${meta.color}18;color:${meta.color}">${meta.emoji}</div>
                    <div>
                      <div class="plugin-row-name">${escapeHtml(p.name)}</div>
                      <div class="plugin-row-desc">${escapeHtml(p.description || '')}</div>
                    </div>
                  </div>
                  <div style="display:flex;align-items:center;gap:12px">
                    <span class="plugin-row-status ${p.is_enabled ? 'on' : 'off'}">${p.is_enabled ? 'Enabled' : 'Disabled'}</span>
                    <label class="toggle-switch">
                      <input type="checkbox" ${p.is_enabled ? 'checked' : ''} onchange="togglePlugin('${p.id}', this.checked)">
                      <span class="toggle-slider"></span>
                    </label>
                  </div>
                </div>`;
            }).join('')}
          </div>`;
      } catch (err) {
        container.innerHTML = `<div class="admin-empty">Failed to load plugins: ${err.message}</div>`;
      }
    }

    async function togglePlugin(pluginId, enable) {
      try {
        await api(`/api/plugins/${pluginId}/${enable ? 'enable' : 'disable'}`, { method: 'POST' });
        // Refresh the plugin list
        const content = document.getElementById('admin-content');
        if (content) await loadAdminPlugins(content);
      } catch (err) {
        alert('Failed to toggle plugin: ' + err.message);
        const content = document.getElementById('admin-content');
        if (content) await loadAdminPlugins(content);
      }
    }

    async function loadAdminSubmissions(container) {
      try {
        const data = await api('/api/moderation/submissions');
        const submissions = data.submissions || [];
        const pending = submissions.filter(s => s.status === 'pending');
        const reviewed = submissions.filter(s => s.status !== 'pending');

        container.innerHTML = `
          <div class="admin-section">
            <h3>Pending Review <span style="font-weight:400;font-size:12px;color:var(--text-dim)">(${pending.length} submissions)</span></h3>
            <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">Third-party apps submitted for review. Approve to make them available to students, or reject with a reason.</p>
            ${pending.length === 0 ? '<div class="admin-empty">No pending submissions. All caught up!</div>' : pending.map(s => {
              const m = s.manifest || {};
              const tools = m.tools || [];
              return `
                <div class="submission-card">
                  <div class="submission-card-header">
                    <div>
                      <span class="submission-card-name">${escapeHtml(m.name || 'Unnamed')}</span>
                      <span class="submission-card-id">${escapeHtml(m.id || '')}</span>
                    </div>
                    <span class="submission-status-badge pending">Pending</span>
                  </div>
                  <div class="submission-card-meta">
                    <strong>Version:</strong> ${escapeHtml(m.version || '?')} &nbsp;|&nbsp;
                    <strong>Category:</strong> ${escapeHtml(m.category || 'N/A')} &nbsp;|&nbsp;
                    <strong>Auth:</strong> ${escapeHtml(m.auth_type || 'none')}<br>
                    ${m.description ? escapeHtml(m.description) : '<em>No description provided</em>'}
                  </div>
                  ${tools.length > 0 ? `
                    <div class="submission-card-tools">
                      <strong>Tools:</strong>
                      ${tools.map(t => `<span class="submission-tool-tag">${escapeHtml(t.name)}</span>`).join('')}
                    </div>
                  ` : ''}
                  <div class="submission-actions">
                    <input type="text" id="notes-${s.id}" placeholder="Review notes (optional)">
                    <button class="admin-btn admin-btn-approve" onclick="approveSubmission('${s.id}')">Approve</button>
                    <button class="admin-btn admin-btn-reject" onclick="rejectSubmission('${s.id}')">Reject</button>
                  </div>
                </div>`;
            }).join('')}
          </div>
          ${reviewed.length > 0 ? `
            <div class="admin-section">
              <h3>Previously Reviewed <span style="font-weight:400;font-size:12px;color:var(--text-dim)">(${reviewed.length})</span></h3>
              ${reviewed.map(s => {
                const m = s.manifest || {};
                return `
                  <div class="submission-card" style="opacity:0.7">
                    <div class="submission-card-header">
                      <div>
                        <span class="submission-card-name">${escapeHtml(m.name || 'Unnamed')}</span>
                        <span class="submission-card-id">${escapeHtml(m.id || '')}</span>
                      </div>
                      <span class="submission-status-badge ${s.status}">${s.status}</span>
                    </div>
                    <div class="submission-card-meta">
                      ${s.review_notes ? '<strong>Notes:</strong> ' + escapeHtml(s.review_notes) : ''}
                      ${s.updated_at ? ' &nbsp;|&nbsp; ' + new Date(s.updated_at).toLocaleDateString() : ''}
                    </div>
                  </div>`;
              }).join('')}
            </div>
          ` : ''}`;
      } catch (err) {
        container.innerHTML = `<div class="admin-empty">Failed to load submissions: ${err.message}</div>`;
      }
    }

    async function approveSubmission(submissionId) {
      try {
        const notes = document.getElementById(`notes-${submissionId}`)?.value || '';
        await api(`/api/moderation/submissions/${submissionId}/approve`, {
          method: 'POST',
          body: JSON.stringify({ notes }),
        });
        const content = document.getElementById('admin-content');
        if (content) await loadAdminSubmissions(content);
      } catch (err) {
        alert('Failed to approve: ' + err.message);
      }
    }

    async function rejectSubmission(submissionId) {
      try {
        const reason = document.getElementById(`notes-${submissionId}`)?.value || 'Does not meet platform guidelines';
        await api(`/api/moderation/submissions/${submissionId}/reject`, {
          method: 'POST',
          body: JSON.stringify({ reason }),
        });
        const content = document.getElementById('admin-content');
        if (content) await loadAdminSubmissions(content);
      } catch (err) {
        alert('Failed to reject: ' + err.message);
      }
    }

    async function loadAdminRules(container) {
      try {
        const data = await api('/api/moderation/rules');
        const rules = data.rules || [];
        container.innerHTML = `
          <div class="admin-section">
            <h3>Platform Compliance Rules <span style="font-weight:400;font-size:12px;color:var(--text-dim)">(${rules.length} rules)</span></h3>
            <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">All learning apps must comply with these rules. Violations are tracked and can result in instant removal.</p>
            ${rules.length === 0 ? '<div class="admin-empty">No rules defined.</div>' : rules.map(r => `
              <div class="rule-card">
                <div class="rule-card-title">
                  ${escapeHtml(r.title)}
                  <span class="severity-badge ${r.severity}">${r.severity}</span>
                </div>
                <div class="rule-card-desc">${escapeHtml(r.description)}</div>
              </div>
            `).join('')}
          </div>`;
      } catch (err) {
        container.innerHTML = `<div class="admin-empty">Failed to load rules: ${err.message}</div>`;
      }
    }

    async function loadAdminViolations(container) {
      try {
        const data = await api('/api/moderation/violations');
        const violations = data.violations || [];
        container.innerHTML = `
          <div class="admin-section">
            <h3>Violation History <span style="font-weight:400;font-size:12px;color:var(--text-dim)">(${violations.length} records)</span></h3>
            <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">Audit trail of all compliance violations reported against learning apps.</p>
            ${violations.length === 0 ? '<div class="admin-empty">No violations recorded. All apps are compliant!</div>' : violations.map(v => `
              <div class="violation-row">
                <div>
                  <div class="violation-row-info">
                    <strong>${escapeHtml(v.plugin_name || v.plugin_id)}</strong> — ${escapeHtml(v.reason)}
                  </div>
                  <div class="violation-row-date">${v.rule_title ? escapeHtml(v.rule_title) + ' | ' : ''}${new Date(v.created_at).toLocaleString()}</div>
                </div>
                <span class="violation-row-action ${v.action_taken}">${v.action_taken}</span>
              </div>
            `).join('')}
          </div>`;
      } catch (err) {
        container.innerHTML = `<div class="admin-empty">Failed to load violations: ${err.message}</div>`;
      }
    }

    // ========== Developer Submit Page ==========
    let submitToolCount = 1;

    function showSubmitPage() {
      state.screen = 'submit';
      submitToolCount = 1;
      renderSubmitPage();
    }

    function renderSubmitPage() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="submit-container">
          <div class="submit-card">
            <h1>Submit Your Learning App</h1>
            <p class="submit-subtitle">
              Build an interactive learning app and submit it to the ChatWeave platform.
              Your app runs in a sandboxed iframe and communicates via the postMessage bridge.
              A teacher will review your submission before it goes live.
            </p>
            <div id="submit-error"></div>
            <div id="submit-success" style="display:none"></div>
            <form id="submit-form">
              <label>App ID <span class="required">*</span></label>
              <input id="sub-id" placeholder="my-learning-app" required pattern="[a-z0-9-]+" />
              <div class="field-hint">Lowercase letters, numbers, and hyphens only. Must be unique.</div>

              <label>App Name <span class="required">*</span></label>
              <input id="sub-name" placeholder="My Learning App" required />

              <label>Version <span class="required">*</span></label>
              <input id="sub-version" placeholder="1.0.0" value="1.0.0" required />

              <label>Description</label>
              <textarea id="sub-desc" placeholder="What does your app teach? How do students interact with it?" rows="3"></textarea>

              <label>Iframe URL <span class="required">*</span></label>
              <input id="sub-iframe" placeholder="/plugins/my-app/ or https://my-app.example.com/" required />
              <div class="field-hint">Where your app is hosted. Use /plugins/app-id/ for bundled apps.</div>

              <label>Category</label>
              <select id="sub-category">
                <option value="education">Education</option>
                <option value="games">Games</option>
                <option value="stem">STEM</option>
                <option value="language">Language</option>
                <option value="finance">Finance</option>
                <option value="media-literacy">Media Literacy</option>
                <option value="other">Other</option>
              </select>

              <label>Tools <span class="required">*</span></label>
              <div class="field-hint" style="margin-bottom:4px">Define the tool(s) the AI will call to launch your app. At least one tool is required.</div>
              <div id="tools-container">
                <div class="tool-entry" data-index="0">
                  <label>Tool Name <span class="required">*</span></label>
                  <input class="tool-name" placeholder="start_quiz" required />
                  <label>Tool Description <span class="required">*</span></label>
                  <input class="tool-desc" placeholder="Start an interactive quiz on the topic" required />
                  <label>Parameters (JSON, optional)</label>
                  <textarea class="tool-params" rows="2" placeholder='{"topic": {"type": "string", "description": "Quiz topic"}}'></textarea>
                </div>
              </div>
              <button type="button" class="add-tool-btn" onclick="addToolEntry()">+ Add Another Tool</button>

              <button type="submit">Submit for Review</button>
            </form>
            <div class="switch">
              ${state.token
                ? '<a href="/" onclick="event.preventDefault();history.pushState(null,\'\',\'/\');state.screen=\'chat\';renderFull()">Back to Chat</a>'
                : 'Have an account? <a href="/" onclick="event.preventDefault();history.pushState(null,\'\',\'/\');state.screen=\'login\';renderFull()">Sign in</a> &nbsp;|&nbsp; <a href="/" onclick="event.preventDefault();history.pushState(null,\'\',\'/\');state.screen=\'register\';renderFull()">Register</a>'
              }
            </div>
          </div>
        </div>`;

      document.getElementById('submit-form').onsubmit = handleSubmitApp;
    }

    function addToolEntry() {
      const container = document.getElementById('tools-container');
      if (!container) return;
      const idx = submitToolCount++;
      const entry = document.createElement('div');
      entry.className = 'tool-entry';
      entry.dataset.index = idx;
      entry.innerHTML = `
        <button type="button" class="tool-remove" onclick="this.parentElement.remove()">&times;</button>
        <label>Tool Name <span class="required">*</span></label>
        <input class="tool-name" placeholder="another_tool" required />
        <label>Tool Description <span class="required">*</span></label>
        <input class="tool-desc" placeholder="What this tool does" required />
        <label>Parameters (JSON, optional)</label>
        <textarea class="tool-params" rows="2" placeholder='{"param": {"type": "string"}}'></textarea>
      `;
      container.appendChild(entry);
    }

    async function handleSubmitApp(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      document.getElementById('submit-error').innerHTML = '';

      try {
        // Collect tools
        const toolEntries = document.querySelectorAll('.tool-entry');
        const tools = [];
        for (const entry of toolEntries) {
          const name = entry.querySelector('.tool-name').value.trim();
          const desc = entry.querySelector('.tool-desc').value.trim();
          const paramsRaw = entry.querySelector('.tool-params').value.trim();
          if (!name || !desc) continue;

          let properties = {};
          if (paramsRaw) {
            try { properties = JSON.parse(paramsRaw); } catch { throw new Error('Invalid JSON in tool parameters. Use format: {"key": {"type": "string"}}'); }
          }

          tools.push({
            name,
            description: desc,
            parameters: { type: 'object', properties },
          });
        }

        if (tools.length === 0) throw new Error('At least one tool is required.');

        const manifest = {
          id: document.getElementById('sub-id').value.trim(),
          name: document.getElementById('sub-name').value.trim(),
          version: document.getElementById('sub-version').value.trim(),
          description: document.getElementById('sub-desc').value.trim() || undefined,
          iframe_url: document.getElementById('sub-iframe').value.trim(),
          auth_type: 'none',
          category: document.getElementById('sub-category').value,
          tools,
        };

        // Need auth for submission — if not logged in, auto-register
        if (!state.token) {
          throw new Error('You must be signed in to submit an app. Please register or sign in first.');
        }

        await api('/api/moderation/submissions', {
          method: 'POST',
          body: JSON.stringify({ manifest }),
        });

        document.getElementById('submit-form').style.display = 'none';
        const success = document.getElementById('submit-success');
        success.style.display = 'block';
        success.innerHTML = `
          <div class="submit-success">
            <strong>App submitted for review!</strong>
            Your app "${escapeHtml(manifest.name)}" (${escapeHtml(manifest.id)}) has been submitted.
            A teacher will review it and approve or reject it. You'll see it appear in the platform once approved.
          </div>
          <div style="text-align:center;margin-top:16px">
            <button onclick="showSubmitPage()" style="padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Submit Another App</button>
          </div>
        `;
      } catch (err) {
        document.getElementById('submit-error').innerHTML = `<div class="auth-error">${escapeHtml(err.message)}</div>`;
        btn.disabled = false;
        btn.textContent = 'Submit for Review';
      }
    }

    // ========== Init ==========
    // Check if URL is /submit
    if (window.location.pathname === '/submit') {
      if (state.token) connectSocket();
      showSubmitPage();
    } else if (state.token) {
      connectSocket();
      loadSessions();
      renderFull();
    } else {
      renderFull();
    }
  </script>
</body>
</html>
